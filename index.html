<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Votre bilan personnalisé | Hypnotyse</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --forest:#1E3A2F; --green:#2E7D5E; --green-light:#7FC4A6; --green-bg:#E8F2EE;
    --cream:#F7F3ED; --text:#1A2E24; --muted:#4A5E54; --label:#8A9E96;
    --red:#C44A3A; --orange:#C8784A; --gold:#E8A020;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{font-size:16px}
  body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;min-height:100dvh}
  .wrap{max-width:720px;margin:0 auto;padding:0 20px 40px;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}

  /* Header */
  .top{display:flex;align-items:center;justify-content:space-between;padding:16px 0 12px}
  .logo{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:22px;color:var(--forest);letter-spacing:.5px}
  .logo span{color:var(--green)}
  .back{border:none;background:none;color:var(--label);font-size:14px;cursor:pointer;padding:8px;visibility:hidden;font-family:inherit}
  .back.visible{visibility:visible}

  /* Progress */
  .progress{height:5px;background:#E5E0D7;border-radius:99px;overflow:hidden;margin-bottom:8px}
  .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--green),var(--green-light));border-radius:99px;transition:width .45s cubic-bezier(.4,0,.2,1)}
  .progress-label{font-size:12px;color:var(--label);text-align:right;margin-bottom:20px;font-weight:500}

  /* Screens */
  .screen{flex:1;display:none;flex-direction:column;animation:fadeUp .35s ease both}
  .screen.active{display:flex}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.screen{animation:none}.progress-fill{transition:none}}

  .eyebrow{font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--green);margin-bottom:10px}
  h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:30px;line-height:1.2;color:var(--forest);margin-bottom:8px}
  h1 em{font-style:italic;color:var(--green)}
  .sub{font-size:15px;color:var(--muted);line-height:1.55;margin-bottom:26px}

  /* Options */
  .options{display:flex;flex-direction:column;gap:12px}
  .opt{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:#fff;border:1.5px solid #E5E0D7;border-radius:14px;padding:17px 18px;font-size:16px;font-weight:500;color:var(--text);cursor:pointer;font-family:inherit;transition:border-color .15s,background .15s,transform .1s}
  .opt:active{transform:scale(.985)}
  .opt.selected{border-color:var(--green);background:var(--green-bg)}
  .opt .check{width:22px;height:22px;border-radius:50%;border:1.5px solid #D5CFC4;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .opt.selected .check{background:var(--green);border-color:var(--green)}
  .opt.selected .check::after{content:'';width:10px;height:6px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translate(1px,-1px)}
  .opt .morpho-badge{width:40px;height:40px;border-radius:12px;background:var(--green-bg);color:var(--forest);font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .opt small{display:block;font-weight:400;font-size:13px;color:var(--muted);margin-top:2px}

  /* Scale 1-5 */
  .scale{display:flex;gap:9px;margin-bottom:10px}
  .scale button{flex:1;aspect-ratio:1/1.05;max-height:74px;border:1.5px solid #E5E0D7;background:#fff;border-radius:14px;font-size:20px;font-weight:600;color:var(--text);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
  .scale button.selected{background:var(--green);border-color:var(--green);color:#fff;transform:scale(1.05)}
  .scale-legend{display:flex;justify-content:space-between;font-size:12.5px;color:var(--label);font-weight:500}

  /* Number input */
  .num-wrap{position:relative;margin-bottom:6px}
  .num-input{width:100%;background:#fff;border:1.5px solid #E5E0D7;border-radius:14px;padding:20px 70px 20px 20px;font-size:26px;font-weight:600;font-family:'Inter',sans-serif;color:var(--forest);outline:none;transition:border-color .15s}
  .num-input:focus{border-color:var(--green)}
  .num-unit{position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--label);font-weight:500}
  .num-hint{font-size:13px;color:var(--red);min-height:18px;margin-bottom:8px}

  /* Text/email inputs */
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:7px}
  .field input{width:100%;background:#fff;border:1.5px solid #E5E0D7;border-radius:14px;padding:16px 18px;font-size:16px;font-family:'Inter',sans-serif;color:var(--text);outline:none;transition:border-color .15s}
  .field input:focus{border-color:var(--green)}
  .consent{display:flex;gap:11px;align-items:flex-start;font-size:13.5px;color:var(--muted);line-height:1.5;margin:16px 0 6px;cursor:pointer}
  .consent input{width:19px;height:19px;margin-top:1px;accent-color:var(--green);flex-shrink:0}
  .legal{font-size:11.5px;color:var(--label);line-height:1.5;margin-top:14px}

  /* CTA */
  .cta{width:100%;border:none;background:var(--forest);color:#fff;font-size:17px;font-weight:600;font-family:'Inter',sans-serif;padding:18px;border-radius:14px;cursor:pointer;margin-top:22px;transition:background .15s,transform .1s,opacity .15s}
  .cta:active{transform:scale(.985)}
  .cta:disabled{opacity:.4;cursor:default}
  .cta.green{background:var(--green)}

  /* Reassurance screens */
  .rea{justify-content:center;text-align:center;padding:10px 0}
  .rea .rea-icon{font-size:38px;margin-bottom:16px}
  .rea h1{font-size:32px}
  .rea .sub{margin-bottom:22px}
  .cards{display:flex;gap:10px;margin:6px 0 20px}
  .card{flex:1;background:#fff;border:1.5px solid #E5E0D7;border-radius:16px;padding:16px 8px}
  .card .v{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;color:var(--forest);line-height:1.1}
  .card .v.accent{color:var(--green)}
  .card .k{font-size:11.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--label);margin-top:5px}
  .rea-note{background:var(--green-bg);border-radius:16px;padding:18px;font-size:14.5px;line-height:1.6;color:var(--text);text-align:left}
  .rea-note strong{color:var(--forest)}
  .stat-line{display:flex;align-items:baseline;gap:12px;text-align:left;padding:13px 0;border-bottom:1px solid #E5E0D7}
  .stat-line:last-of-type{border-bottom:none}
  .stat-line .n{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;color:var(--green);min-width:76px}
  .stat-line .t{font-size:14.5px;color:var(--muted);line-height:1.45}

  .group-label{font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--label);margin:22px 0 12px}
  .group-label:first-of-type{margin-top:0}

  /* Loader / maintenance */
  .center-msg{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px;color:var(--muted)}
  .spinner{width:34px;height:34px;border:3px solid var(--green-bg);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(min-width:721px){h1{font-size:36px}.rea h1{font-size:38px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <button class="back" id="btnBack" aria-label="Question précédente">&larr; Retour</button>
    <div class="logo">Hypno<span>tyse</span></div>
    <div style="width:64px"></div>
  </div>
  <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel"></div>
  <div id="app" class="center-msg"><div class="spinner"></div><div>Préparation de votre bilan…</div></div>
</div>

<script>
/* ============================================================
   CONFIG TECHNIQUE
   ============================================================ */
const SUPABASE_URL = "https://ydyogdzwdudmuzbpsozz.supabase.co";
const SUPABASE_KEY = "sb_publishable_W8FTMb_XDkEKO4XbRRB7CQ_YJEURUS-";
const SB_HEADERS = {
  "apikey": SUPABASE_KEY,
  "Authorization": "Bearer " + SUPABASE_KEY,
  "Content-Type": "application/json"
};

let CONFIG = {
  redirect_url_results: "https://app.hypnotyse.com/bilan-resultats",
  redirect_url_fallback: "https://www.hypnotyse.com",
  pixel_id: "",
  quiz_active: "true"
};

/* ============================================================
   SESSION & TRACKING
   ============================================================ */
const params = new URLSearchParams(location.search);
const fbclid = params.get("fbclid") || localStorage.getItem("hy_fbclid") || null;
if (params.get("fbclid")) localStorage.setItem("hy_fbclid", params.get("fbclid"));

let sessionId = localStorage.getItem("hy_quiz_session");
let sessionCreated = !!sessionId;
if (!sessionId) {
  sessionId = (crypto.randomUUID) ? crypto.randomUUID() :
    "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
      const r = Math.random()*16|0; return (c==="x"?r:(r&0x3|0x8)).toString(16);
    });
}

const state = {
  answers: {},        // toutes les réponses brutes
  stepIndex: 0,
  quizStarted: false
};

async function ensureSession() {
  if (sessionCreated) return;
  sessionCreated = true;
  localStorage.setItem("hy_quiz_session", sessionId);
  try {
    await fetch(SUPABASE_URL + "/rest/v1/quiz_sessions", {
      method: "POST",
      headers: { ...SB_HEADERS, "Prefer": "resolution=ignore-duplicates" },
      body: JSON.stringify({
        id: sessionId,
        fbclid: fbclid,
        utm_source: params.get("utm_source"),
        utm_medium: params.get("utm_medium"),
        utm_campaign: params.get("utm_campaign"),
        utm_content: params.get("utm_content"),
        landing_variant: params.get("lp") || null
      })
    });
  } catch(e) { /* silencieux, ne bloque jamais l'utilisatrice */ }
}

function saveProgress(extraFields) {
  const body = Object.assign({
    current_step: state.stepIndex,
    answers: state.answers
  }, extraFields || {});
  try {
    fetch(SUPABASE_URL + "/rest/v1/quiz_sessions?id=eq." + sessionId, {
      method: "PATCH",
      headers: SB_HEADERS,
      body: JSON.stringify(body),
      keepalive: true
    });
  } catch(e) { /* silencieux */ }
}

/* ============================================================
   META PIXEL
   ============================================================ */
function initPixel(pixelId) {
  if (!pixelId) return;
  !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
  n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,
  document,'script','https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', pixelId);
  fbq('track', 'PageView');
}
function trackQuizStart() {
  if (window.fbq) fbq('trackCustom', 'QuizStart', {}, { eventID: "qs_" + sessionId });
}
function trackLead() {
  if (window.fbq) fbq('track', 'Lead', {}, { eventID: sessionId });
}

/* ============================================================
   CALCULS
   ============================================================ */
function calc() {
  const t = Number(state.answers.taille_cm) || 0;
  const p = Number(state.answers.poids_actuel) || 0;
  const pi = Number(state.answers.poids_ideal) || 0;
  const h2 = (t/100)*(t/100);
  return {
    imc: h2 ? +(p/h2).toFixed(1) : null,
    imcObjectif: h2 ? +(pi/h2).toFixed(1) : null,
    pReco: h2 ? Math.round(22*h2) : null,
    pRecoBas: h2 ? Math.round(18.5*h2) : null,
    aPerdre: (p && pi) ? +(p-pi).toFixed(1) : null
  };
}
function scoreEmotionnel() {
  return (Number(state.answers.sucre)||0) + (Number(state.answers.stress)||0) + (Number(state.answers.echec)||0);
}

/* ============================================================
   DÉFINITION DES ÉTAPES
   ============================================================ */
const STEPS = [
  { id:"objectif", type:"single", q:1,
    title:"Quel est votre <em>objectif</em> de perte de poids ?",
    key:"objectif_kg",
    options:["Moins de 5 kg","5 à 10 kg","10 à 15 kg","Plus de 15 kg"] },

  { id:"age", type:"number", q:2,
    title:"Quel est votre âge ?",
    sub:"Votre profil hormonal dépend de votre âge. Il influence directement la façon dont votre corps stocke et brûle les calories.",
    key:"age", unit:"ans", min:18, max:95, placeholder:"52" },

  { id:"taille", type:"number", q:3,
    title:"Quelle est votre taille ?",
    key:"taille_cm", unit:"cm", min:120, max:220, placeholder:"165" },

  { id:"poids", type:"number", q:4,
    title:"Quel est votre poids actuel ?",
    sub:"Cette information reste strictement confidentielle. Elle sert uniquement à calculer votre profil.",
    key:"poids_actuel", unit:"kg", min:40, max:250, decimal:true, placeholder:"72" },

  { id:"ideal", type:"number", q:5,
    title:"Quel poids aimeriez-vous <em>atteindre</em> ?",
    key:"poids_ideal", unit:"kg", min:40, max:250, decimal:true, placeholder:"63" },

  { id:"rea1", type:"rea1" },

  { id:"duree", type:"single", q:6,
    title:"Depuis combien de temps essayez-vous de perdre du poids ?",
    key:"duree_tentative",
    options:["Moins de 6 mois","Entre 6 mois et 1 an","Entre 1 et 3 ans","Plus de 3 ans"] },

  { id:"projection", type:"multi", q:7, max:2,
    title:"Une fois votre poids idéal atteint, <em>qu'est-ce qui changera</em> le plus pour vous ?",
    sub:"2 réponses maximum.",
    key:"objectif_vie",
    options:[
      "Une amélioration de ma santé et de ma forme physique",
      "Pouvoir reporter mes vêtements préférés",
      "Être plus à l'aise face au regard des autres",
      "Une relation saine et apaisée avec la nourriture",
      "Plus de confiance dans mes relations personnelles et intimes"
    ] },

  { id:"obstacle", type:"single", q:8,
    title:"Selon vous, qu'est-ce qui vous <em>empêche</em> aujourd'hui d'y arriver ?",
    key:"obstacle_percu",
    options:[
      "Le grignotage et les envies incontrôlables",
      "Le manque de motivation qui s'essouffle",
      "Le stress et les émotions qui prennent le dessus",
      "Les régimes qui ne tiennent jamais sur la durée",
      "Je ne sais pas vraiment, et c'est ça le problème"
    ] },

  { id:"morphotype", type:"single", q:9, morpho:true,
    title:"Quelle silhouette vous décrit le mieux ?",
    key:"morphotype",
    options:[
      {v:"V", t:"Épaules plus larges que les hanches"},
      {v:"X", t:"Épaules et hanches alignées, taille marquée"},
      {v:"I", t:"Silhouette fine et longiligne"},
      {v:"A", t:"Hanches plus larges que les épaules"},
      {v:"H", t:"Épaules et hanches alignées, taille peu marquée"},
      {v:"O", t:"Silhouette toute en rondeurs"}
    ] },

  { id:"symptomes", type:"multi", q:10, max:6,
    title:"Quels symptômes ressentez-vous habituellement ?",
    sub:"Plusieurs réponses possibles.",
    key:"symptomes",
    options:[
      "Fatigue fréquente ou manque d'énergie",
      "Ballonnements, digestion difficile",
      "Sommeil perturbé",
      "Douleurs articulaires",
      "Fringales soudaines",
      "Aucun en particulier"
    ] },

  { id:"moments", type:"multi", q:11, max:5,
    title:"À quels moments ressentez-vous le besoin de <em>grignoter</em> ?",
    sub:"Plusieurs réponses possibles.",
    key:"moments_grignotage",
    options:[
      "Dans la matinée",
      "Dans l'après-midi",
      "Le soir devant la télévision",
      "Tard le soir ou la nuit",
      "Je ne grignote presque jamais"
    ] },

  { id:"rea2", type:"rea2" },

  { id:"sucre", type:"scale", q:12,
    title:"« J'ai du mal à résister aux envies de sucre ou de chocolat. »",
    key:"sucre" },

  { id:"stress", type:"scale", q:13,
    title:"« Je mange souvent à cause du stress, de l'ennui ou d'émotions négatives. »",
    key:"stress" },

  { id:"echec", type:"scale", q:14,
    title:"« Quand je fais un écart, le sentiment d'échec me pousse à en faire encore plus. »",
    key:"echec" },

  { id:"rea3", type:"rea3" },

  { id:"rythme", type:"rythme", q:15,
    title:"Dernière étape : votre <em>rythme</em> idéal" },

  { id:"email", type:"email" }
];
const TOTAL_Q = 15;

/* ============================================================
   RENDU
   ============================================================ */
const app = document.getElementById("app");
const fill = document.getElementById("progressFill");
const plabel = document.getElementById("progressLabel");
const btnBack = document.getElementById("btnBack");

function render() {
  const step = STEPS[state.stepIndex];
  const pct = Math.round(((state.stepIndex+1)/STEPS.length)*100);
  fill.style.width = pct + "%";
  plabel.textContent = step.q ? ("Question " + step.q + " sur " + TOTAL_Q) : "";
  btnBack.classList.toggle("visible", state.stepIndex > 0 && step.type !== "email");
  app.className = "screen active" + (step.type.startsWith("rea") ? " rea" : "");

  if (step.type === "single")   return renderSingle(step);
  if (step.type === "multi")    return renderMulti(step);
  if (step.type === "number")   return renderNumber(step);
  if (step.type === "scale")    return renderScale(step);
  if (step.type === "rea1")     return renderRea1();
  if (step.type === "rea2")     return renderRea2();
  if (step.type === "rea3")     return renderRea3();
  if (step.type === "rythme")   return renderRythme(step);
  if (step.type === "email")    return renderEmail();
}

function next(extraFields) {
  if (!state.quizStarted) { state.quizStarted = true; ensureSession().then(trackQuizStart); }
  state.stepIndex++;
  saveProgress(extraFields);
  window.scrollTo(0,0);
  render();
}
btnBack.addEventListener("click", () => {
  if (state.stepIndex > 0) { state.stepIndex--; render(); }
});

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;"); }

/* ---------- Single choice ---------- */
function renderSingle(step) {
  app.innerHTML = `
    <div class="eyebrow">Votre bilan personnalisé</div>
    <h1>${step.title}</h1>
    ${step.sub ? `<div class="sub">${step.sub}</div>` : `<div style="height:18px"></div>`}
    <div class="options" id="opts"></div>`;
  const box = document.getElementById("opts");
  step.options.forEach(o => {
    const isObj = typeof o === "object";
    const val = isObj ? o.v : o;
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.innerHTML = step.morpho
      ? `<span class="morpho-badge">${esc(val)}</span><span><strong>Silhouette en ${esc(val)}</strong><small>${esc(o.t)}</small></span>`
      : `<span class="check"></span><span>${esc(val)}</span>`;
    btn.addEventListener("click", () => {
      box.querySelectorAll(".opt").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      state.answers[step.key] = val;
      const promoted = {};
      if (["duree_tentative","obstacle_percu","morphotype"].includes(step.key)) promoted[step.key] = val;
      setTimeout(() => next(promoted), 280);
    });
    box.appendChild(btn);
  });
}

/* ---------- Multi choice ---------- */
function renderMulti(step) {
  app.innerHTML = `
    <div class="eyebrow">Votre bilan personnalisé</div>
    <h1>${step.title}</h1>
    <div class="sub">${step.sub || ""}</div>
    <div class="options" id="opts"></div>
    <button class="cta" id="btnNext" disabled>Continuer</button>`;
  const box = document.getElementById("opts");
  const btnNext = document.getElementById("btnNext");
  const sel = new Set(state.answers[step.key] || []);
  step.options.forEach(o => {
    const btn = document.createElement("button");
    btn.className = "opt" + (sel.has(o) ? " selected" : "");
    btn.innerHTML = `<span class="check"></span><span>${esc(o)}</span>`;
    btn.addEventListener("click", () => {
      if (sel.has(o)) { sel.delete(o); btn.classList.remove("selected"); }
      else if (sel.size < step.max) { sel.add(o); btn.classList.add("selected"); }
      btnNext.disabled = sel.size === 0;
    });
    box.appendChild(btn);
  });
  btnNext.disabled = sel.size === 0;
  btnNext.addEventListener("click", () => {
    const arr = [...sel];
    state.answers[step.key] = arr;
    const promoted = {};
    if (step.key === "objectif_vie") promoted.objectif_vie = arr.join(" | ");
    next(promoted);
  });
}

/* ---------- Number ---------- */
function renderNumber(step) {
  app.innerHTML = `
    <div class="eyebrow">Votre bilan personnalisé</div>
    <h1>${step.title}</h1>
    ${step.sub ? `<div class="sub">${step.sub}</div>` : `<div style="height:18px"></div>`}
    <div class="num-wrap">
      <input class="num-input" id="numInput" type="number" inputmode="${step.decimal ? "decimal":"numeric"}"
        ${step.decimal ? 'step="0.1"' : ''} placeholder="${step.placeholder}" value="${state.answers[step.key] ?? ""}">
      <span class="num-unit">${step.unit}</span>
    </div>
    <div class="num-hint" id="numHint"></div>
    <button class="cta" id="btnNext">Continuer</button>`;
  const input = document.getElementById("numInput");
  const hint = document.getElementById("numHint");
  input.focus();
  function validate() {
    const v = parseFloat(String(input.value).replace(",","."));
    if (isNaN(v)) { hint.textContent = ""; return null; }
    if (v < step.min || v > step.max) {
      hint.textContent = `Merci d'indiquer une valeur entre ${step.min} et ${step.max} ${step.unit}.`;
      return null;
    }
    if (step.key === "poids_ideal" && state.answers.poids_actuel && v >= Number(state.answers.poids_actuel)) {
      hint.textContent = "Votre poids idéal doit être inférieur à votre poids actuel.";
      return null;
    }
    hint.textContent = "";
    return v;
  }
  function submit() {
    const v = validate();
    if (v === null) { if(!input.value) hint.textContent = "Merci de renseigner ce champ."; return; }
    state.answers[step.key] = v;
    const promoted = {}; promoted[step.key] = v;
    if (step.key === "poids_ideal") {
      const c = calc();
      promoted.imc_actuel = c.imc; promoted.imc_objectif = c.imcObjectif; promoted.poids_recommande = c.pReco;
    }
    next(promoted);
  }
  input.addEventListener("input", validate);
  input.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
  document.getElementById("btnNext").addEventListener("click", submit);
}

/* ---------- Scale 1-5 ---------- */
function renderScale(step) {
  app.innerHTML = `
    <div class="eyebrow">Est-ce que cette phrase vous ressemble ?</div>
    <h1>${step.title}</h1>
    <div style="height:18px"></div>
    <div class="scale" id="scale"></div>
    <div class="scale-legend"><span>Pas du tout</span><span>Totalement</span></div>`;
  const box = document.getElementById("scale");
  for (let i=1; i<=5; i++) {
    const b = document.createElement("button");
    b.textContent = i;
    if (state.answers[step.key] === i) b.classList.add("selected");
    b.addEventListener("click", () => {
      box.querySelectorAll("button").forEach(x => x.classList.remove("selected"));
      b.classList.add("selected");
      state.answers[step.key] = i;
      const promoted = {};
      if (step.key === "echec") promoted.score_emotionnel = scoreEmotionnel();
      setTimeout(() => next(promoted), 300);
    });
    box.appendChild(b);
  }
}

/* ---------- Rythme : temps + moment ---------- */
function renderRythme(step) {
  app.innerHTML = `
    <div class="eyebrow">Votre bilan personnalisé</div>
    <h1>${step.title}</h1>
    <div class="sub">Pour construire un programme qui s'adapte à votre quotidien.</div>
    <div class="group-label">Temps disponible chaque jour</div>
    <div class="options" id="optsTemps"></div>
    <div class="group-label">Meilleur moment pour écouter votre séance</div>
    <div class="options" id="optsMoment"></div>
    <button class="cta" id="btnNext" disabled>Continuer</button>`;
  const temps = ["10 minutes","20 minutes","30 minutes ou plus"];
  const moments = ["Le matin au réveil","Dans la journée","Le soir au coucher"];
  const btnNext = document.getElementById("btnNext");
  function makeGroup(containerId, list, key) {
    const box = document.getElementById(containerId);
    list.forEach(o => {
      const b = document.createElement("button");
      b.className = "opt" + (state.answers[key] === o ? " selected" : "");
      b.innerHTML = `<span class="check"></span><span>${esc(o)}</span>`;
      b.addEventListener("click", () => {
        box.querySelectorAll(".opt").forEach(x => x.classList.remove("selected"));
        b.classList.add("selected");
        state.answers[key] = o;
        btnNext.disabled = !(state.answers.temps_dispo && state.answers.moment_ecoute);
      });
      box.appendChild(b);
    });
  }
  makeGroup("optsTemps", temps, "temps_dispo");
  makeGroup("optsMoment", moments, "moment_ecoute");
  btnNext.disabled = !(state.answers.temps_dispo && state.answers.moment_ecoute);
  btnNext.addEventListener("click", () => next({ moment_ecoute: state.answers.moment_ecoute }));
}

/* ---------- Email + résultats ---------- */
function renderEmail() {
  fill.style.width = "97%";
  plabel.textContent = "Dernière étape";
  app.innerHTML = `
    <div class="eyebrow">Votre bilan est prêt</div>
    <h1>Où souhaitez-vous <em>recevoir</em> vos résultats ?</h1>
    <div class="sub">Votre profil personnalisé et votre programme recommandé vous attendent sur la page suivante.</div>
    <div class="field"><label for="fPrenom">Votre prénom</label>
      <input id="fPrenom" type="text" autocomplete="given-name" placeholder="Marie"></div>
    <div class="field"><label for="fEmail">Votre adresse email</label>
      <input id="fEmail" type="email" autocomplete="email" inputmode="email" placeholder="marie@exemple.fr"></div>
    <label class="consent"><input type="checkbox" id="fConsent">
      <span>J'accepte de recevoir mes résultats et les informations relatives au programme par email.</span></label>
    <div class="num-hint" id="formHint"></div>
    <button class="cta green" id="btnNext">Découvrir mes résultats</button>
    <div class="legal">Vos données restent confidentielles et ne sont jamais partagées. L'autohypnose est déconseillée aux personnes diagnostiquées avec des troubles psychotiques ou de schizophrénie. Hypnotyse ne remplace pas un avis médical.</div>`;
  const hint = document.getElementById("formHint");
  document.getElementById("btnNext").addEventListener("click", async () => {
    const prenom = document.getElementById("fPrenom").value.trim();
    const email = document.getElementById("fEmail").value.trim();
    const consent = document.getElementById("fConsent").checked;
    if (!prenom) { hint.textContent = "Merci d'indiquer votre prénom."; return; }
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) { hint.textContent = "Merci d'indiquer une adresse email valide."; return; }
    if (!consent) { hint.textContent = "Merci de cocher la case pour recevoir vos résultats."; return; }
    hint.textContent = "";
    const btn = document.getElementById("btnNext");
    btn.disabled = true; btn.textContent = "Préparation de vos résultats…";

    state.answers.prenom = prenom; state.answers.email = email;
    const c = calc();
    trackLead();
    saveProgress({
      prenom, email,
      age: Number(state.answers.age) || null,
      taille_cm: Number(state.answers.taille_cm) || null,
      poids_actuel: state.answers.poids_actuel ?? null,
      poids_ideal: state.answers.poids_ideal ?? null,
      imc_actuel: c.imc, imc_objectif: c.imcObjectif, poids_recommande: c.pReco,
      morphotype: state.answers.morphotype || null,
      duree_tentative: state.answers.duree_tentative || null,
      objectif_vie: (state.answers.objectif_vie || []).join ? (state.answers.objectif_vie || []).join(" | ") : state.answers.objectif_vie,
      obstacle_percu: state.answers.obstacle_percu || null,
      score_emotionnel: scoreEmotionnel(),
      moment_ecoute: state.answers.moment_ecoute || null,
      completed_at: new Date().toISOString()
    });

    /* Redirection personnalisée */
    const r = new URLSearchParams({
      sid: sessionId,
      prenom: prenom,
      poids: state.answers.poids_actuel ?? "",
      ideal: state.answers.poids_ideal ?? "",
      aperdre: c.aPerdre ?? "",
      imc: c.imc ?? "",
      reco: c.pReco ?? "",
      morpho: state.answers.morphotype ?? "",
      duree: state.answers.duree_tentative ?? "",
      vie: ([].concat(state.answers.objectif_vie || []))[0] ?? "",
      obstacle: state.answers.obstacle_percu ?? "",
      score: scoreEmotionnel(),
      moment: state.answers.moment_ecoute ?? ""
    });
    if (fbclid) r.set("fbclid", fbclid);
    setTimeout(() => {
      location.href = CONFIG.redirect_url_results + "?" + r.toString();
    }, 900);
  });
}

/* ============================================================
   INIT : chargement config puis démarrage
   ============================================================ */
(async function init(){
  try {
    const res = await fetch(SUPABASE_URL + "/rest/v1/quiz_config?select=key,value", { headers: SB_HEADERS });
    if (res.ok) (await res.json()).forEach(row => { CONFIG[row.key] = row.value; });
  } catch(e) { /* on garde les valeurs par défaut */ }

  if (CONFIG.quiz_active === "false") {
    app.className = "center-msg";
    app.innerHTML = `<div style="font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--forest)">Le bilan est momentanément indisponible</div><div>Revenez dans quelques instants.</div>`;
    return;
  }
  initPixel(CONFIG.pixel_id);
  render();
})();
